<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Views of nature - Louis Coppey</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background-color: #fff;
      --text-color: #2C1810;
      --border-color: #E8E0D8;
      --hover-color: #F5F2EF;
      --header-border: #2C1810;
      --date-color: #8B7355;
      --footer-color: #A6957A;
    }

    [data-theme="dark"] {
      --background-color: #1A0F08;
      --text-color: #E8E0D8;
      --border-color: #4A3C2A;
      --hover-color: #2A1F15;
      --header-border: #E8E0D8;
      --date-color: #C4B8A8;
      --footer-color: #A6957A;
    }

    html {
      overflow-x: hidden;
      max-width: 100vw;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      font-family: 'Roboto Mono', monospace;
      color: var(--text-color);
      line-height: 1.6;
      font-size: 18px;
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    header {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--background-color);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    header h1 {
      font-size: 18px;
      font-weight: 400;
      margin: 0;
    }

    header h1 a {
      color: var(--text-color);
      text-decoration: none;
    }

    header h1 a:hover { text-decoration: underline; }

    main {
      max-width: 800px;
      margin: 100px auto 80px;
      padding: 0 20px;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 40px;
    }

    .theme-toggle {
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Roboto Mono', monospace;
      font-size: 18px;
      color: var(--text-color);
      transition: color 0.3s ease;
    }

    .theme-toggle:hover { color: var(--date-color); text-decoration: underline; }

    .theme-toggle .sun-icon { display: block; }
    .theme-toggle .moon-icon { display: none; }
    [data-theme="dark"] .theme-toggle .sun-icon { display: none; }
    [data-theme="dark"] .theme-toggle .moon-icon { display: block; }

    /* ── Video grid ── */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px 24px;
    }

    .video-item {}

    .video-wrap {
      position: relative;
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Sound toggle badge */
    .sound-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-family: 'Roboto Mono', monospace;
      pointer-events: none;
      transition: opacity 0.3s;
      user-select: none;
    }

    .video-caption {
      margin-top: 10px;
      font-size: 13px;
      color: var(--date-color);
      line-height: 1.4;
    }

    /* Empty state */
    .empty-state {
      color: var(--date-color);
      font-size: 15px;
    }

    /* Footer */
    .footer-text {
      text-align: center;
      padding: 30px 20px;
      font-size: 13px;
      color: var(--footer-color);
    }

    /* Responsive */
    @media screen and (max-width: 600px) {
      .video-grid {
        grid-template-columns: 1fr;
        gap: 40px;
      }
    }

    @media screen and (max-width: 768px) {
      body { font-size: 16px; }
      header h1 { font-size: 16px; }
      .theme-toggle { font-size: 16px; }
      h2 { font-size: 16px; }
      header { padding: 15px 20px; }
      main { margin: 80px auto 40px; }
    }

    @media screen and (max-width: 480px) {
      body { font-size: 14px; }
      header { padding: 12px 15px; }
      header h1 { font-size: 14px; }
      .theme-toggle { font-size: 14px; }
      main { margin: 70px auto 40px; padding: 0 15px; }
    }
  </style>
  <script>
    let videosData = [];

    async function loadVideos() {
      try {
        const res = await fetch('Videos.csv');
        const text = await res.text();
        const rows = text.split('\n').filter(r => r.trim());
        videosData = rows.slice(1).map(row => {
          const [name, ...rest] = row.split(',');
          return { name: name.trim(), caption: rest.join(',').trim() };
        }).filter(v => v.name);
      } catch (e) {
        videosData = [];
      }
      renderGrid();
      initObserver();
    }

    function renderGrid() {
      const grid = document.querySelector('.video-grid');
      grid.innerHTML = '';

      if (videosData.length === 0) {
        grid.innerHTML = '<p class="empty-state">Nothing here yet.</p>';
        return;
      }

      videosData.forEach((v, i) => {
        const item = document.createElement('div');
        item.className = 'video-item';

        const wrap = document.createElement('div');
        wrap.className = 'video-wrap';

        const video = document.createElement('video');
        video.src = `videos/${v.name}`;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.preload = 'metadata';

        // Tap to toggle sound
        const badge = document.createElement('div');
        badge.className = 'sound-badge';
        badge.textContent = '♫ tap for sound';

        wrap.addEventListener('click', () => {
          video.muted = !video.muted;
          badge.textContent = video.muted ? '♫ tap for sound' : '♫ on';
        });

        wrap.appendChild(video);
        wrap.appendChild(badge);

        const caption = document.createElement('div');
        caption.className = 'video-caption';
        caption.textContent = v.caption;

        item.appendChild(wrap);
        item.appendChild(caption);
        grid.appendChild(item);
      });
    }

    // Play videos only when visible in viewport
    function initObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target.querySelector('video');
          if (!video) return;
          if (entry.isIntersecting) {
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll('.video-wrap').forEach(wrap => {
        observer.observe(wrap);
      });
    }

    function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (prefersDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    initTheme();
    window.addEventListener('load', loadVideos);
  </script>
</head>
<body>

<header>
  <h1><a href="index.html">Louis Coppey</a></h1>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span class="sun-icon">light/dark</span>
    <span class="moon-icon">light/dark</span>
  </button>
</header>

<main>
  <h2>Views of nature</h2>
  <div class="video-grid">
    <!-- Videos loaded dynamically from Videos.csv -->
  </div>
</main>

<div class="footer-text">vibecoded with Claude in Paris</div>

</body>
</html>
