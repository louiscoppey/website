<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Post — Feed</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fff;
      --text: #2C1810;
      --border: #E8E0D8;
      --hover: #F5F2EF;
      --muted: #8B7355;
      --header-bg: #F8F6F4;
    }
    [data-theme="dark"] {
      --bg: #1A0F08;
      --text: #E8E0D8;
      --border: #4A3C2A;
      --hover: #2A1F15;
      --muted: #C4B8A8;
      --header-bg: #2A1F15;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Roboto Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Setup ── */
    #setup {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 40px 24px;
      max-width: 480px; margin: 0 auto; width: 100%;
    }
    #setup h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    #setup .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.03em; }
    .field input {
      width: 100%; padding: 12px 14px;
      font-family: 'Roboto Mono', monospace; font-size: 14px;
      background: var(--hover); border: 1px solid var(--border);
      color: var(--text); outline: none; border-radius: 4px; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--muted); }
    .btn-primary {
      width: 100%; padding: 13px;
      font-family: 'Roboto Mono', monospace; font-size: 15px; font-weight: 500;
      background: var(--text); color: var(--bg);
      border: none; border-radius: 4px; cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.8; }
    .setup-note { font-size: 12px; color: var(--muted); margin-top: 18px; text-align: center; line-height: 1.6; }

    /* ── Chat ── */
    #chat { flex: 1; display: none; flex-direction: column; height: 100dvh; }

    .chat-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; background: var(--bg);
    }
    .chat-header-title { font-size: 16px; font-weight: 500; }
    .header-actions { display: flex; gap: 16px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Roboto Mono', monospace; font-size: 13px;
      color: var(--muted); padding: 2px 0; transition: color 0.2s;
    }
    .icon-btn:hover { color: var(--text); }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .msg { max-width: 88%; line-height: 1.65; font-size: 15px; white-space: pre-wrap; word-break: break-word; }
    .msg.user {
      align-self: flex-end; background: var(--hover);
      border: 1px solid var(--border); padding: 10px 15px;
      border-radius: 18px 18px 4px 18px;
    }
    .msg.assistant { align-self: flex-start; }
    .msg.system {
      align-self: center; font-size: 12px; color: var(--muted);
      background: var(--header-bg); border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 20px; max-width: 100%; text-align: center;
    }

    /* Typing */
    .typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; align-self: flex-start; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.3s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0; background: var(--bg);
    }
    #msg-input {
      flex: 1; font-family: 'Roboto Mono', monospace; font-size: 15px;
      background: var(--hover); border: 1px solid var(--border); color: var(--text);
      border-radius: 20px; padding: 10px 16px; resize: none; outline: none;
      min-height: 42px; max-height: 130px; overflow-y: auto; line-height: 1.5; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--muted); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--text); color: var(--bg); border: none; cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s; line-height: 1;
    }
    #send-btn:disabled { opacity: 0.3; cursor: default; }
    #send-btn:active:not(:disabled) { opacity: 0.7; }

    /* ── Posts panel ── */
    #panel-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 50; display: none;
      transition: opacity 0.25s; opacity: 0;
    }
    #panel-bg.open { opacity: 1; }

    #posts-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 78vh; background: var(--bg);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      z-index: 51; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.28s ease;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #posts-panel.open { transform: translateY(0); }

    .panel-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .panel-header-title { font-size: 15px; font-weight: 500; }
    .panel-close {
      background: none; border: none; font-family: 'Roboto Mono', monospace;
      font-size: 13px; color: var(--muted); cursor: pointer; padding: 2px;
    }
    .panel-close:hover { color: var(--text); }

    #posts-list { overflow-y: auto; flex: 1; }

    .post-item { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .post-item:last-child { border-bottom: none; }
    .post-item-date { font-size: 12px; color: var(--muted); margin-bottom: 3px; }
    .post-item-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .post-item-preview {
      font-size: 13px; color: var(--muted); margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-item-actions { display: flex; gap: 10px; }
    .post-action-btn {
      background: none; border: 1px solid var(--border);
      font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--muted);
      padding: 4px 12px; border-radius: 4px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .post-action-btn:hover { color: var(--text); border-color: var(--muted); }
    .post-action-btn.del:hover { color: #b94040; border-color: #b94040; }

    .panel-state { padding: 36px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <h1>Feed assistant</h1>
  <p class="subtitle">One-time setup. Keys are saved locally on this device only.</p>
  <div class="field">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="setup-anthropic" placeholder="sk-ant-api03-..." autocomplete="off" />
  </div>
  <div class="field">
    <label>GITHUB PERSONAL ACCESS TOKEN</label>
    <input type="password" id="setup-github" placeholder="ghp_..." autocomplete="off" />
  </div>
  <button class="btn-primary" onclick="saveSetup()">Save & Start</button>
  <p class="setup-note">Keys never leave your device.<br>GitHub token needs <strong>repo</strong> write access.</p>
</div>

<!-- Chat -->
<div id="chat">
  <div class="chat-header">
    <span class="chat-header-title">Feed</span>
    <div class="header-actions">
      <button class="icon-btn" onclick="openPostsPanel()">posts</button>
      <button class="icon-btn" onclick="newChat()">new</button>
      <button class="icon-btn" onclick="showSettings()">settings</button>
    </div>
  </div>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="msg-input" placeholder="What's on your mind?" rows="1"
      onkeydown="handleKey(event)" oninput="onInputChange()"></textarea>
    <button id="send-btn" onclick="send()" disabled>↑</button>
  </div>
</div>

<!-- Posts panel -->
<div id="panel-bg" onclick="closePostsPanel()"></div>
<div id="posts-panel">
  <div class="panel-header">
    <span class="panel-header-title">Your posts</span>
    <button class="panel-close" onclick="closePostsPanel()">close</button>
  </div>
  <div id="posts-list"><div class="panel-state">Loading…</div></div>
</div>

<script>
  // ── Config ───────────────────────────────────────────────
  const REPO   = 'louiscoppey/website';
  const BRANCH = 'main';
  const MODEL  = 'claude-sonnet-4-6';

  const TOOLS = [
    {
      name: 'post_to_feed',
      description: "Appends a new entry to Louis's feed. Call this as soon as he confirms.",
      input_schema: {
        type: 'object',
        properties: {
          title:   { type: 'string', description: 'Short title. Empty string if none needed.' },
          content: { type: 'string', description: 'Entry text. Plain text, no markdown, no line breaks.' }
        },
        required: ['title', 'content']
      }
    },
    {
      name: 'edit_feed_entry',
      description: "Replaces an existing feed entry. Use the exact date string from the post list as original_date.",
      input_schema: {
        type: 'object',
        properties: {
          original_date: { type: 'string', description: 'Exact date string of the entry to edit (e.g. "2026/3/1 14:30").' },
          new_date:      { type: 'string', description: 'Optional new date string if the user wants to change the date. Use same format: "YYYY/M/D HH:MM". Omit or use empty string to keep original.' },
          title:         { type: 'string', description: 'New title. Empty string if none.' },
          content:       { type: 'string', description: 'New content. Plain text, no markdown.' }
        },
        required: ['original_date', 'title', 'content']
      }
    }
  ];

  // ── State ────────────────────────────────────────────────
  let messages     = [];
  let busy         = false;
  let currentPosts = [];

  // ── Theme ────────────────────────────────────────────────
  (function () {
    const saved = localStorage.getItem('theme');
    const dark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (dark) document.documentElement.setAttribute('data-theme', 'dark');
  })();

  // ── System prompt (dynamic) ──────────────────────────────
  function buildSystem() {
    const list = currentPosts.length === 0
      ? 'Feed is currently empty.'
      : [...currentPosts]
          .sort((a, b) => b.date.localeCompare(a.date))
          .map((p, i) => `${i + 1}. [date: "${p.date}"] ${p.title ? `"${p.title}" — ` : ''}${p.content}`)
          .join('\n');

    return `You are Louis's personal feed assistant. Louis runs a personal site at louicop.xyz and has a Feed page where he shares short thoughts and ideas.

Your job: help him post new entries or edit existing ones, then commit them.

When posting:
1. Confirm or lightly refine — keep his voice.
2. Suggest a short title only when it adds context.
3. The moment he says "post it", "yes", "go ahead", "looks good" — call post_to_feed immediately.

When editing:
1. Show him the current text and ask what to change.
2. Apply the edit and call edit_feed_entry with the exact original_date. If he wants to change the date too, pass the new date as new_date (format: "YYYY/M/D HH:MM").

Rules: plain text only, no markdown, no asterisks. Short and direct. After any action, send a short confirmation.

Current feed posts:
${list}`;
  }

  // ── Init ─────────────────────────────────────────────────
  function init() {
    if (localStorage.getItem('anthropic_key') && localStorage.getItem('github_token')) {
      openChat();
    }
  }

  function saveSetup() {
    const ak = document.getElementById('setup-anthropic').value.trim();
    const gh = document.getElementById('setup-github').value.trim();
    if (!ak || !gh) { alert('Both keys are required.'); return; }
    localStorage.setItem('anthropic_key', ak);
    localStorage.setItem('github_token', gh);
    openChat();
  }

  async function openChat() {
    document.getElementById('setup').style.display = 'none';
    const chat = document.getElementById('chat');
    chat.style.display = 'flex';
    chat.style.flexDirection = 'column';
    if (messages.length === 0) greet();
    document.getElementById('msg-input').focus();
    try {
      const { text } = await fetchCSV();
      currentPosts = parseCSV(text);
    } catch (e) { console.warn('Could not preload posts:', e); }
  }

  function showSettings() {
    document.getElementById('chat').style.display = 'none';
    const s = document.getElementById('setup');
    s.style.display = 'flex';
    document.getElementById('setup-anthropic').value = localStorage.getItem('anthropic_key') || '';
    document.getElementById('setup-github').value    = localStorage.getItem('github_token')  || '';
  }

  function newChat() {
    messages = [];
    document.getElementById('messages').innerHTML = '';
    greet();
  }

  function greet() { addMsg('assistant', "What's on your mind?"); }

  // ── UI helpers ───────────────────────────────────────────
  function addMsg(role, text) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
    scrollBottom();
    return el;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing'; el.id = 'typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(el);
    scrollBottom();
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }
  function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

  function onInputChange() {
    const val = document.getElementById('msg-input').value.trim();
    document.getElementById('send-btn').disabled = !val || busy;
    autoResize(document.getElementById('msg-input'));
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  // ── Send ─────────────────────────────────────────────────
  async function send() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || busy) return;

    input.value = ''; input.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    addMsg('user', text);
    messages.push({ role: 'user', content: text });

    busy = true; showTyping();
    try { await callClaude(); }
    catch (err) { removeTyping(); addMsg('assistant', 'Something went wrong. Check your API key and try again.'); console.error(err); }
    busy = false; onInputChange();
  }

  // ── Claude API (streaming) ───────────────────────────────
  async function callClaude() {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': localStorage.getItem('anthropic_key'),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: MODEL, max_tokens: 1024, system: buildSystem(), tools: TOOLS, messages, stream: true })
    });

    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullText = '', tool = null, toolJson = '', msgEl = null;

    removeTyping();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (!data) continue;
        let ev; try { ev = JSON.parse(data); } catch { continue; }

        if (ev.type === 'content_block_start') {
          if (ev.content_block.type === 'text' && !msgEl) msgEl = addMsg('assistant', '');
          if (ev.content_block.type === 'tool_use') { tool = { id: ev.content_block.id, name: ev.content_block.name }; toolJson = ''; }
        }
        if (ev.type === 'content_block_delta') {
          if (ev.delta.type === 'text_delta') { fullText += ev.delta.text; if (msgEl) msgEl.textContent = fullText; scrollBottom(); }
          if (ev.delta.type === 'input_json_delta') toolJson += ev.delta.partial_json;
        }
      }
    }

    const assistantContent = [];
    if (fullText) assistantContent.push({ type: 'text', text: fullText });
    if (tool) assistantContent.push({ type: 'tool_use', id: tool.id, name: tool.name, input: JSON.parse(toolJson || '{}') });
    if (assistantContent.length) messages.push({ role: 'assistant', content: assistantContent });

    if (tool) await handleTool(tool.id, tool.name, JSON.parse(toolJson || '{}'));
  }

  // ── Tool handler ─────────────────────────────────────────
  async function handleTool(toolId, toolName, input) {
    const labels = { post_to_feed: ['Posting…', 'Posted ✓'], edit_feed_entry: ['Updating…', 'Updated ✓'] };
    const [loadingLabel, doneLabel] = labels[toolName] || ['Working…', 'Done ✓'];
    const sysMsg = addMsg('system', loadingLabel);

    let toolResult;
    try {
      if (toolName === 'post_to_feed') {
        await commitToGitHub(input.title || '', input.content || '');
      } else if (toolName === 'edit_feed_entry') {
        await editInGitHub(input.original_date, input.title || '', input.content || '', input.new_date || '');
      }
      sysMsg.textContent = doneLabel;
      toolResult = `${doneLabel} successfully.`;
      // Refresh local post cache
      try { const { text } = await fetchCSV(); currentPosts = parseCSV(text); } catch (e) {}
    } catch (err) {
      sysMsg.textContent = `Error: ${err.message}`;
      toolResult = `Error: ${err.message}`;
      console.error(err);
    }

    messages.push({ role: 'user', content: [{ type: 'tool_result', tool_use_id: toolId, content: toolResult }] });
    showTyping();
    await callClaude();
  }

  // ── GitHub CSV helpers ───────────────────────────────────
  async function fetchCSV() {
    const token = localStorage.getItem('github_token');
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/contents/Stream.csv?ref=${BRANCH}&t=${Date.now()}`,
      { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) throw new Error('Could not read Stream.csv — check your GitHub token.');
    const data = await res.json();
    return { text: decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))), sha: data.sha };
  }

  function parseCSV(text) {
    return text.split('\n').slice(1).filter(r => r.trim()).map(row => {
      const parts = row.split(';');
      if (parts.length < 3) return null;
      return { date: parts[0].trim(), title: parts[1].trim(), content: parts.slice(2).join(';').trim() };
    }).filter(Boolean);
  }

  function buildCSVText(rows) {
    return 'date;title;content\n' + rows.map(r => `${r.date};${r.title};${r.content}`).join('\n') + '\n';
  }

  async function putCSV(text, sha, message) {
    const token = localStorage.getItem('github_token');
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/Stream.csv`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
      body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(text))), sha, branch: BRANCH })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Commit failed.'); }
  }

  async function commitToGitHub(title, content) {
    const safeTitle   = (title   || '').replace(/[;\n\r]/g, ' ').trim();
    const safeContent = (content || '').replace(/[;\n\r]/g, ' ').trim();
    const now  = new Date();
    const date = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ` +
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const { text, sha } = await fetchCSV();
    const newText = text.trimEnd() + '\n' + `${date};${safeTitle};${safeContent}` + '\n';
    await putCSV(newText, sha, `feed: ${(safeTitle || safeContent).slice(0, 72)}`);
  }

  async function editInGitHub(originalDate, title, content, newDate) {
    const safeTitle   = (title   || '').replace(/[;\n\r]/g, ' ').trim();
    const safeContent = (content || '').replace(/[;\n\r]/g, ' ').trim();
    const safeDate    = (newDate || '').replace(/[;\n\r]/g, ' ').trim() || originalDate;
    const { text, sha } = await fetchCSV();
    const rows = parseCSV(text);
    const idx  = rows.findIndex(r => r.date === originalDate);
    if (idx === -1) throw new Error(`Post not found (date: ${originalDate})`);
    rows[idx] = { date: safeDate, title: safeTitle, content: safeContent };
    await putCSV(buildCSVText(rows), sha, `feed edit: ${(safeTitle || safeContent).slice(0, 60)}`);
  }

  async function deleteFromGitHub(originalDate) {
    const { text, sha } = await fetchCSV();
    const rows = parseCSV(text).filter(r => r.date !== originalDate);
    await putCSV(buildCSVText(rows), sha, `feed delete: ${originalDate}`);
  }

  // ── Posts panel ──────────────────────────────────────────
  function formatPostDate(dateStr) {
    const parts = dateStr.trim().split(/[/ ]/);
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]))
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  async function openPostsPanel() {
    const bg    = document.getElementById('panel-bg');
    const panel = document.getElementById('posts-panel');
    bg.style.display = 'block';
    requestAnimationFrame(() => { bg.classList.add('open'); panel.classList.add('open'); });

    const list = document.getElementById('posts-list');
    list.innerHTML = '<div class="panel-state">Loading…</div>';
    try {
      const { text } = await fetchCSV();
      currentPosts = parseCSV(text);
      renderPostsList();
    } catch (err) {
      list.innerHTML = `<div class="panel-state">Error: ${esc(err.message)}</div>`;
    }
  }

  function closePostsPanel() {
    document.getElementById('panel-bg').classList.remove('open');
    document.getElementById('posts-panel').classList.remove('open');
    setTimeout(() => { document.getElementById('panel-bg').style.display = 'none'; }, 300);
  }

  function renderPostsList() {
    const list = document.getElementById('posts-list');
    if (currentPosts.length === 0) {
      list.innerHTML = '<div class="panel-state">No posts yet.</div>';
      return;
    }
    const sorted = [...currentPosts].sort((a, b) => b.date.localeCompare(a.date));
    list.innerHTML = '';
    sorted.forEach(post => {
      const div = document.createElement('div');
      div.className = 'post-item';
      div.innerHTML = `
        <div class="post-item-date">${formatPostDate(post.date)}</div>
        ${post.title ? `<div class="post-item-title">${esc(post.title)}</div>` : ''}
        <div class="post-item-preview">${esc(post.content)}</div>
        <div class="post-item-actions">
          <button class="post-action-btn" onclick="startEditPost('${post.date.replace(/'/g,"\\'")}')">edit</button>
          <button class="post-action-btn del" onclick="confirmDelete('${post.date.replace(/'/g,"\\'")}')">delete</button>
        </div>`;
      list.appendChild(div);
    });
  }

  async function startEditPost(originalDate) {
    closePostsPanel();
    const post = currentPosts.find(p => p.date === originalDate);
    if (!post) return;

    messages = [];
    document.getElementById('messages').innerHTML = '';

    const ctx = `I want to edit this post:\nDate: ${post.date}\n${post.title ? `Title: ${post.title}\n` : ''}Content: ${post.content}\n\nYou can change the date, title, and/or content.`;
    addMsg('user', ctx);
    messages.push({ role: 'user', content: ctx });

    busy = true; showTyping();
    try { await callClaude(); }
    catch (err) { removeTyping(); addMsg('assistant', 'Something went wrong.'); }
    busy = false; onInputChange();
  }

  async function confirmDelete(originalDate) {
    const post  = currentPosts.find(p => p.date === originalDate);
    const label = post?.title || post?.content?.slice(0, 40) || originalDate;
    if (!confirm(`Delete "${label}"?`)) return;

    closePostsPanel();
    const sysMsg = addMsg('system', 'Deleting…');
    try {
      await deleteFromGitHub(originalDate);
      sysMsg.textContent = 'Deleted ✓';
      currentPosts = currentPosts.filter(p => p.date !== originalDate);
    } catch (err) {
      sysMsg.textContent = `Error: ${err.message}`;
    }
  }

  // ── Start ─────────────────────────────────────────────────
  init();
</script>
</body>
</html>
