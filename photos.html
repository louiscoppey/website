<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photos - Louis Coppey</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background-color: #fff;
      --text-color: #2C1810;
      --border-color: #E8E0D8;
      --hover-color: #F5F2EF;
      --header-border: #2C1810;
      --table-header-bg: #F8F6F4;
      --date-color: #8B7355;
      --footer-color: #A6957A;
    }

    [data-theme="dark"] {
      --background-color: #1A0F08;
      --text-color: #E8E0D8;
      --border-color: #4A3C2A;
      --hover-color: #2A1F15;
      --header-border: #E8E0D8;
      --table-header-bg: #2A1F15;
      --date-color: #C4B8A8;
      --footer-color: #A6957A;
    }

    html {
      overflow-x: hidden;
      max-width: 100vw;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      font-family: 'Roboto Mono', monospace;
      color: var(--text-color);
      line-height: 1.6;
      font-size: 18px;
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      overflow-x: hidden;
      max-width: 100vw;
      box-sizing: border-box;
    }

    header {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--background-color);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    header h1 {
      font-size: 18px;
      font-weight: 400;
      margin: 0;
    }

    header h1 a {
      color: var(--text-color);
      text-decoration: none;
      transition: text-decoration 0.3s ease;
    }

    header h1 a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 800px;
      margin: 100px auto 80px;
      padding: 0 20px;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 40px;
    }

    .theme-toggle {
      position: relative;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto Mono', monospace;
      font-size: 18px;
      color: var(--text-color);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .theme-toggle:hover {
      color: var(--date-color);
      text-decoration: underline;
    }

    .theme-toggle .sun-icon {
      display: block;
    }

    .theme-toggle .moon-icon {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .sun-icon {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .moon-icon {
      display: block;
    }

    /* Gallery */
    .photo-gallery {
      display: flex;
      flex-direction: column;
      gap: 60px;
      max-width: 600px;
    }

    .photo-item {
      display: block;
    }

    .photo-item img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s ease;
    }

    .photo-item img:hover {
      opacity: 0.92;
    }

    .photo-caption {
      margin-top: 10px;
      font-size: 13px;
      color: var(--date-color);
      font-family: 'Roboto Mono', monospace;
      line-height: 1.4;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-family: 'Roboto Mono', monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }

    .lightbox-close:hover {
      color: #fff;
    }

    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* Lightbox nav */
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-family: 'Roboto Mono', monospace;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 12px;
      line-height: 1;
    }

    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    .lightbox-prev:hover,
    .lightbox-next:hover {
      color: #fff;
    }

    /* Footer */
    .footer-text {
      text-align: center;
      padding: 30px 20px;
      font-size: 13px;
      color: var(--footer-color);
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
      body { font-size: 16px; }
      header h1 { font-size: 16px; }
      .theme-toggle { font-size: 16px; }
      h2 { font-size: 16px; }
      header { padding: 15px 20px; }
      main { margin: 80px auto 40px; }
      .photo-gallery { gap: 48px; }
    }

    @media screen and (max-width: 480px) {
      body { font-size: 14px; }
      header { padding: 12px 15px; }
      header h1 { font-size: 14px; }
      .theme-toggle { font-size: 14px; }
      main { margin: 70px auto 40px; padding: 0 15px; }
      .photo-gallery { gap: 40px; }
    }
  </style>
  <script>
    let photosData = [];
    let lightboxIndex = 0;

    async function loadPhotosData() {
      try {
        const response = await fetch('Photos.csv');
        const csvText = await response.text();
        const rows = csvText.split('\n').filter(row => row.trim());
        photosData = rows.slice(1).map(row => {
          const [name, ...rest] = row.split(',');
          return { name: name.trim(), subtitle: rest.join(',').trim() };
        });
        createGallery();
      } catch (error) {
        console.error('Error loading photos data:', error);
        photosData = [{ name: 'Self_US.jpg', subtitle: 'Picture in the lift, West Village | Nov \'24' }];
        createGallery();
      }
    }

    function createGallery() {
      const gallery = document.querySelector('.photo-gallery');
      gallery.innerHTML = '';

      photosData.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'photo-item';

        const img = document.createElement('img');
        img.src = `photos/${photo.name}`;
        img.alt = photo.subtitle;
        img.loading = 'lazy';
        img.onclick = () => openLightbox(index);

        const caption = document.createElement('div');
        caption.className = 'photo-caption';
        caption.textContent = photo.subtitle;

        item.appendChild(img);
        item.appendChild(caption);
        gallery.appendChild(item);
      });
    }

    function openLightbox(index) {
      lightboxIndex = index;
      renderLightbox();
      document.querySelector('.lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.querySelector('.lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const photo = photosData[lightboxIndex];
      document.querySelector('.lightbox img').src = `photos/${photo.name}`;
      document.querySelector('.lightbox img').alt = photo.subtitle;
      document.querySelector('.lightbox-caption').textContent = photo.subtitle;
    }

    function lightboxNav(dir) {
      lightboxIndex = (lightboxIndex + dir + photosData.length) % photosData.length;
      renderLightbox();
    }

    function initTheme() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (prefersDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    initTheme();

    window.addEventListener('load', () => {
      loadPhotosData();
    });

    document.addEventListener('keydown', (e) => {
      const lb = document.querySelector('.lightbox');
      if (!lb || !lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'ArrowLeft') lightboxNav(-1);
    });
  </script>
</head>
<body>

<header>
  <h1><a href="index.html">Louis Coppey</a></h1>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <span class="sun-icon">light/dark</span>
    <span class="moon-icon">light/dark</span>
  </button>
</header>

<main>
  <h2>Photos</h2>
  <div class="photo-gallery">
    <!-- Photos loaded dynamically -->
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">close</button>
  <button class="lightbox-prev" onclick="event.stopPropagation(); lightboxNav(-1)">← prev</button>
  <img src="" alt="" onclick="event.stopPropagation()">
  <button class="lightbox-next" onclick="event.stopPropagation(); lightboxNav(1)">next →</button>
  <div class="lightbox-caption"></div>
</div>

<div class="footer-text">vibecoded with Claude in Paris</div>

</body>
</html>
